name: Heartbeat Monitor

# WG-23 -- independent watchdog for the wiki-generator pipeline.
#
# The pipeline's liveness signal is a PR opened by the bot account whose
# credential is `WIKI_BOT_TOKEN`. This workflow checks how long ago that
# account last opened a PR; if the gap exceeds the threshold, it alerts
# Telegram.
#
# Independent of Hermes by construction: it runs entirely on GitHub-hosted
# runners on a cron schedule, with no call into the Hermes VPS. If Hermes
# stops, the heartbeat goes stale and this workflow keeps firing to report it.

on:
  schedule:
    - cron: '23 7 * * *'  # daily, 07:23 UTC
  workflow_dispatch:
    inputs:
      simulate_stale:
        description: 'Force the stale-heartbeat condition to verify the alert path'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: heartbeat-monitor
  cancel-in-progress: false

env:
  STALE_THRESHOLD_HOURS: 48

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check wiki bot heartbeat
        id: check
        env:
          GH_TOKEN: ${{ secrets.WIKI_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          SIMULATE_STALE: ${{ inputs.simulate_stale }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "ERROR: WIKI_BOT_TOKEN secret is not set -- cannot resolve the bot account." >&2
            exit 1
          fi

          BOT_LOGIN=$(gh api user --jq '.login')
          echo "Wiki bot account: ${BOT_LOGIN}"

          LAST_PR_JSON=$(gh pr list --repo "$REPO" --author "$BOT_LOGIN" \
            --state all --limit 1 --json number,createdAt)
          LAST_PR_NUMBER=$(echo "$LAST_PR_JSON" | jq -r '.[0].number // empty')
          LAST_PR_CREATED=$(echo "$LAST_PR_JSON" | jq -r '.[0].createdAt // empty')

          NOW_EPOCH=$(date -u +%s)

          if [ -z "$LAST_PR_CREATED" ]; then
            echo "No PR found authored by ${BOT_LOGIN}."
            AGE_HOURS=99999
            DETAIL="no PR ever authored by ${BOT_LOGIN}"
          else
            PR_EPOCH=$(date -u -d "$LAST_PR_CREATED" +%s)
            AGE_HOURS=$(( (NOW_EPOCH - PR_EPOCH) / 3600 ))
            DETAIL="last PR #${LAST_PR_NUMBER} opened ${AGE_HOURS}h ago (${LAST_PR_CREATED})"
          fi
          echo "Heartbeat: ${DETAIL}"

          STALE=false
          if [ "${SIMULATE_STALE:-false}" = "true" ]; then
            echo "simulate_stale=true -- forcing stale condition for alert verification."
            STALE=true
            DETAIL="SIMULATED stale heartbeat (manual dispatch) -- ${DETAIL}"
          elif [ "$AGE_HOURS" -gt "$STALE_THRESHOLD_HOURS" ]; then
            STALE=true
          fi

          echo "stale=${STALE}" >> "$GITHUB_OUTPUT"
          echo "detail=${DETAIL}" >> "$GITHUB_OUTPUT"

      - name: Alert Telegram on stale heartbeat
        if: steps.check.outputs.stale == 'true'
        env:
          WIKI_TELEGRAM_WEBHOOK: ${{ secrets.WIKI_TELEGRAM_WEBHOOK }}
          DETAIL: ${{ steps.check.outputs.detail }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${WIKI_TELEGRAM_WEBHOOK:-}" ]; then
            echo "ERROR: WIKI_TELEGRAM_WEBHOOK not set -- cannot send stale-heartbeat alert." >&2
            exit 1
          fi
          MSG="wiki-generator: HEARTBEAT STALE -- ${DETAIL}. Threshold ${STALE_THRESHOLD_HOURS}h. Run: ${RUN_URL}"
          curl --silent --show-error --fail-with-body --max-time 10 \
            -X POST "$WIKI_TELEGRAM_WEBHOOK" \
            --data-urlencode "text=${MSG}"
          echo "Stale-heartbeat alert sent to Telegram."

      - name: Heartbeat OK
        if: steps.check.outputs.stale != 'true'
        run: echo "Heartbeat healthy -- ${{ steps.check.outputs.detail }}"

      - name: Notify Telegram on failure
        if: failure()
        env:
          WIKI_TELEGRAM_WEBHOOK: ${{ secrets.WIKI_TELEGRAM_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${WIKI_TELEGRAM_WEBHOOK:-}" ]; then
            echo "WIKI_TELEGRAM_WEBHOOK not set -- skipping failure alert."
            exit 0
          fi
          MSG="wiki-generator: heartbeat-monitor workflow FAILED (watchdog itself errored). Run: ${RUN_URL}"
          curl --silent --show-error --fail-with-body --max-time 10 \
            -X POST "$WIKI_TELEGRAM_WEBHOOK" \
            --data-urlencode "text=${MSG}"
